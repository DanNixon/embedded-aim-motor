---
name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  formatting:
    name: Formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v21

      - name: Format
        run: nix develop --command treefmt --fail-on-change

  library:
    name: Library
    runs-on: ubuntu-latest
    needs:
      - formatting

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v21

      - name: Clippy
        run: nix develop --command cargo clippy -- -Dwarnings

      - name: Build
        run: nix develop --command cargo build

  examples:
    name: Example
    runs-on: ubuntu-latest
    needs:
      - library

    strategy:
      matrix:
        firmware:
          - drive
          - parameters
          - set-baud

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v21

      - name: Clippy
        run: |
          set -x
          cd ./examples/${{ matrix.example }}
          nix develop --command cargo clippy -- -Dwarnings

      - name: Build
        run: |
          set -x
          cd ./examples/${{ matrix.example }}
          nix develop --command cargo build --release
